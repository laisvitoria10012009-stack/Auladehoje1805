<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Cadastro de Produtos</h1>
    <p>Gerencie o estoque após efetuar login.</p>
  </header>

  <main>
    <section class="panel header-actions">
      <div>
        <button id="logoutButton" class="secondary">Sair</button>
      </div>
      <div id="message" class="message"></div>
    </section>

    <section class="panel">
      <h2>Buscar Produtos</h2>
      <div class="form-row">
        <input id="searchInput" type="text" placeholder="Buscar por nome..." />
        <button id="searchButton">Buscar</button>
        <button id="refreshButton">Listar todos</button>
      </div>
    </section>

    <section class="panel">
      <h2>Lista de Produtos</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="productTable"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Adicionar / Atualizar Produto</h2>
      <form id="productForm">
        <input type="hidden" id="productId" />

        <div class="form-row">
          <label for="nome">Nome</label>
          <input id="nome" type="text" required />
        </div>

        <div class="form-row">
          <label for="preco">Preço</label>
          <input id="preco" type="number" min="0" step="0.01" required />
        </div>

        <div class="form-row">
          <label for="estoque">Estoque</label>
          <input id="estoque" type="number" min="0" step="1" required />
        </div>

        <div class="form-row">
          <label for="categoria">Categoria</label>
          <input id="categoria" type="text" required />
        </div>

        <div class="button-row">
          <button type="submit">Salvar</button>
          <button type="button" id="clearButton" class="secondary">Limpar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="cadastro.js"></script>
</body>
</html>
